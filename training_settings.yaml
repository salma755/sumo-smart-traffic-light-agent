# simulation
gui: false
total_episodes: 100
max_steps: 5400
n_cars_generated: 1000
green_duration: 25   # زدت المدة لضمان تفريغ الزحام
yellow_duration: 4
turn_chance: 0.25

# model
num_layers: 4
width_layers: 400
batch_size: 100
learning_rate: 0.001
training_epochs: 100 # قللت الرقم لسرعة التعلم ومنع التكرار الغبي

# memory
memory_size_min: 200
memory_size_max: 50000

# agent
gamma: 0.95         # رفعته ليفكر الموديل في المدى البعيد

# paths
sumocfg_file: intersection/sumo_config.sumocfg